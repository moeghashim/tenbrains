name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck, lint, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24" # required: the CLI uses the built-in node:sqlite module
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check (typecheck + lint + tests)
        run: npm run check

      - name: Build
        run: npm run build
