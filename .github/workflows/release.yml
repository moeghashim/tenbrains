name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-and-deploy:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Detect pending changesets
        id: changesets
        run: |
          count="$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then
            echo "pending=true" >> "$GITHUB_OUTPUT"
          else
            echo "pending=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check formatting and types
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Typecheck web app
        run: npm run -w @tenbrains/web typecheck

      - name: Stop when no release work is pending
        if: steps.changesets.outputs.pending != 'true'
        run: echo "No pending changesets on main. Skipping package versioning, npm publish, and GitHub Release steps."

      - name: Validate deploy secrets
        run: |
          missing=0
          for secret_name in CONVEX_DEPLOY_KEY VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            secret_value="${!secret_name}"
            if [ -z "$secret_value" ]; then
              echo "Missing required deploy secret: $secret_name" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Validate release secrets
        if: steps.changesets.outputs.pending == 'true'
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "Missing required release secret: NODE_AUTH_TOKEN" >&2
            exit 1
          fi

      - name: Pull Vercel project settings
        run: npx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Validate production Convex target
        run: node scripts/validate-production-convex-env.mjs

      - name: Version release from changesets
        if: steps.changesets.outputs.pending == 'true'
        run: npm run release:version

      - name: Refresh lockfile after versioning
        if: steps.changesets.outputs.pending == 'true'
        run: npm install --package-lock-only --ignore-scripts

      - name: Resolve release version
        if: steps.changesets.outputs.pending == 'true'
        id: version
        run: echo "value=$(node -e 'console.log(JSON.parse(require(\"node:fs\").readFileSync(\"packages/core/package.json\", \"utf8\")).version)')" >> "$GITHUB_OUTPUT"

      - name: Commit release changes back to main
        if: steps.changesets.outputs.pending == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .changeset package-lock.json package.json packages apps
          git commit -m "Release v${{ steps.version.outputs.value }}"
          git push origin HEAD:main

      - name: Deploy Convex backend
        working-directory: apps/web
        run: npx convex deploy -y

      - name: Build web app
        run: npm run -w @tenbrains/web build

      - name: Build extension release zip
        if: steps.changesets.outputs.pending == 'true'
        run: npm run extension:package

      - name: Resolve extension asset path
        if: steps.changesets.outputs.pending == 'true'
        id: extension-asset
        run: echo "path=$(ls apps/extension/dist/tenbrains-for-x-*.zip)" >> "$GITHUB_OUTPUT"

      - name: Publish npm packages
        if: steps.changesets.outputs.pending == 'true'
        run: npm run release:publish

      - name: Deploy to Vercel production
        id: deploy
        run: |
          deployment_url="$(npx vercel@latest deploy --yes --prod --token="$VERCEL_TOKEN" | tail -n 1)"
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.changesets.outputs.pending == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_tag="v${{ steps.version.outputs.value }}"
          release_target="$(git rev-parse HEAD)"
          if gh release view "$release_tag" >/dev/null 2>&1; then
            echo "GitHub release $release_tag already exists; skipping."
            exit 0
          fi
          gh release create "$release_tag" "${{ steps.extension-asset.outputs.path }}" \
            --title "$release_tag" \
            --target "$release_target" \
            --generate-notes \
            --notes "Production deploy: ${{ steps.deploy.outputs.url }}

            Site alias: https://www.tenbrains.app"
